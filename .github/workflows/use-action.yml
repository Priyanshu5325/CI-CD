name: Use Action Workflow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check Node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test